{% extends "base.html" %}
{% block title %}Login · Paper Trading{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <form method="post" action="/login"
        class="w-full max-w-sm card p-6 shadow-lg">
    <h1 class="text-lg font-semibold mb-4 text-default">Sign in</h1>
    {% if error %}
      <div class="mb-3 text-sm text-down bg-down-soft border border-default rounded px-3 py-2">{{ error }}</div>
    {% endif %}
    <label class="block text-sm text-default mb-1" for="password">Password</label>
    <input id="password" name="password" type="password" autofocus required class="input w-full text-sm">
    <button class="btn-accent w-full mt-4 text-sm font-medium">Continue</button>
  </form>
</div>
{% endblock %}
