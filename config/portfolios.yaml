# Active paper-trading portfolios. Each entry produces one portfolio in the DB
# (UPSERT by name on trader startup). Anything not in this file is auto-disabled.
#
# Default selection (5 strategies × 2 capitals = 10 portfolios):
#   S6_tiered_exit  — single buy on -5%, 33%/50%/100% at +15%/+30%/+50%
#   S14_concentrated — max 1 buy/day on deepest drop, ₹25k, +35%
#   S23_s20_equity8 — % of equity sizing, vol-confirmed pyramid
#   S29_s23_sensex  — S23 + SENSEX regime gate
#   S31_s24_persist — trigger-mode entry + 3-candle persistence filter
#
# To swap strategies after the backtest finishes:
#   1. Edit this file
#   2. `pm2 restart paperaglo-trader`

portfolios:
  # ── S6_tiered_exit ──
  - name: S6_tiered_exit_50k
    strategy: S6_tiered_exit
    capital: 50000
    enabled: true
  - name: S6_tiered_exit_100k
    strategy: S6_tiered_exit
    capital: 100000
    enabled: true

